<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
  <script>
    document.documentElement.dataset.theme = localStorage.getItem('tetris-theme') === 'light' ? 'light' : 'dark';
  </script>
</head>
<body>
  <div class="wrapper">
    <div class="header-row">
      <h1 class="game-title">TETRIS</h1>
      <label class="theme-toggle" for="theme-switch" title="Cambiar tema">
        <span class="theme-icon">🌙</span>
        <input type="checkbox" id="theme-switch" />
        <span class="theme-slider"></span>
        <span class="theme-icon">☀️</span>
      </label>
    </div>
    <div class="game-container">
      <div class="board-wrap">
        <canvas id="board" width="300" height="600"></canvas>
        <div id="combo-msg" class="combo-msg hidden"></div>
      </div>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>

        <div class="panel-section records-section">
          <span class="label">RECORDS</span>
          <ol id="records-list" class="records-list"></ol>
          <div class="records-stats">
            <span>Mejor combo: <strong id="best-combo">0</strong></span>
            <span>Máx. líneas: <strong id="best-lines">0</strong></span>
          </div>
          <button id="reset-records-btn" class="reset-records-btn">Resetear records</button>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-box">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>

        <div id="new-record-form" class="new-record-form hidden">
          <label for="player-name-input">¡Nueva puntuación en el Top 5! Introduce tu nombre:</label>
          <div class="new-record-row">
            <input type="text" id="player-name-input" maxlength="12" placeholder="Jugador" />
            <button id="save-record-btn">Guardar</button>
          </div>
        </div>

        <div class="overlay-records">
          <span class="label">TOP 5</span>
          <ol id="overlay-records-list" class="records-list"></ol>
        </div>

        <button id="restart-btn">Reiniciar</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
